<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal portfolio of Evgenii Baiakhmetov">
    <title>Evgenii Baiakhmetov | Portfolio</title>

    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        #matrixCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
        }

        .form-check-input {
            background-color: #ADB5BD !important;
            border-color: #ADB5BD !important;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23ffffff'/%3e%3c/svg%3e") !important;
        }
        .form-check-input:checked {
            background-color: #ADB5BD !important;
            border-color: #ADB5BD !important;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23000000'/%3e%3c/svg%3e") !important;
        }
        .form-check-input:focus { box-shadow: none !important; outline: none !important; }

        .solar-system-container {
            position: relative; width: 100%; flex-grow: 1;
            cursor: grab; background: #212529; transition: background 0.6s ease;
        }
        .solar-system-container:active { cursor: grabbing; }
        [data-bs-theme="light"] .solar-system-container { background: #ffffff; }

        #solarCanvas {
            position: absolute; top: 0; left: 0;
            display: block; width: 100%; height: 100%; z-index: 1;
        }

        .planet-label {
            position: absolute; pointer-events: none;
            color: white; font-weight: bold; font-size: 1rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.6);
            white-space: nowrap; transform: translate(-50%, -150%);
            opacity: 0; transition: opacity 0.3s ease; z-index: 20;
        }
        [data-bs-theme="light"] .planet-label {
            color: #1a1a2e;
            text-shadow: 0 0 10px rgba(255,255,255,1), 0 0 20px rgba(255,255,255,0.8);
        }
        @media (max-width: 768px) { .planet-label { font-size: 0.8rem; } }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 overflow-hidden">
    <canvas id="matrixCanvas"></canvas>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
                Evgenii Baiakhmetov
                <img src="logo.svg" id="matrixLogo" alt="Evgenii Baiakhmetov" class="rounded-circle flex-shrink-0" style="width: 1.8em; height: 1.8em; object-fit: cover; border: 2px solid #fff;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3 gap-lg-2">
                    <li class="nav-item"><a class="nav-link" href="cv.html">CV</a></li>
                    <li class="nav-item"><a class="nav-link" href="Research_Output.html">Research Output</a></li>
                    <li class="nav-item"><a class="nav-link" href="fieldwork.html">Fieldwork</a></li>
                    <li class="nav-item"><a class="nav-link" href="procrastination.html">Procrastination</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item theme-toggle-wrapper d-flex align-items-center">
                        <div class="form-check form-switch m-0 d-flex align-items-center">
                            <input class="form-check-input mt-0" type="checkbox" id="theme-toggle" role="switch">
                            <label class="form-check-label text-white ms-2" for="theme-toggle"></label>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex flex-column p-0 m-0">
        <div class="solar-system-container" id="solarContainer">
            <canvas id="solarCanvas"></canvas>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        &copy; 2026. Publish or Perish Enterprise. All Rights Reversed.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>

    <script>
        /* ==========================================
           0. MATRIX EASTER EGG (Now Asynchronous Instantly!)
           ========================================== */
        (function() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');
            const matrixLogo = document.getElementById('matrixLogo');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const alphabet = 'ACGT012-9'; const fontSize = 16;
            let columns = canvas.width / fontSize; let drops = [];
            
            // FIX: Randomize the starting positions of the drops so they fall asynchronously from the very first frame!
            for (let x = 0; x < columns; x++) {
                drops[x] = Math.floor(Math.random() * (canvas.height / fontSize)); 
            }
            
            let matrixInterval; let isMatrixActive = false;

            const drawMatrix = () => {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            };

            const startMatrix = () => {
                if (!isMatrixActive) { 
                    isMatrixActive = true; 
                    canvas.style.opacity = '1'; 
                    matrixInterval = setInterval(drawMatrix, 33); 
                }
            };

            const stopMatrix = () => {
                if (isMatrixActive) {
                    isMatrixActive = false; 
                    canvas.style.opacity = '0';
                    setTimeout(() => { 
                        if (!isMatrixActive) { 
                            clearInterval(matrixInterval); 
                            ctx.clearRect(0, 0, canvas.width, canvas.height); 
                        } 
                    }, 500);
                }
            };

            window.addEventListener('mousemove', (e) => {
                if (!matrixLogo) return;
                const rect = matrixLogo.getBoundingClientRect();
                const distance = Math.hypot(e.clientX - (rect.left + rect.width / 2), e.clientY - (rect.top + rect.height / 2));
                if (distance < 80) { startMatrix(); } else { stopMatrix(); }
            });

            if (matrixLogo) {
                matrixLogo.addEventListener('touchstart', (e) => {
                    startMatrix();
                    setTimeout(stopMatrix, 4000);
                }, { passive: true });
            }

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                columns = canvas.width / fontSize; drops = [];
                // FIX: Ensure resizing also applies random staggers
                for (let x = 0; x < columns; x++) drops[x] = Math.floor(Math.random() * (canvas.height / fontSize));
            });
        })();

        /* ==========================================
           1. THREE.JS SOLAR SYSTEM + DISCOVERY ONE
           ========================================== */
        (function() {
            
            const CONFIG = {
                dragSensitivity: 0.00005,
                momentumFriction: 0.92,
                planetSpinSpeed: 0.002,   
                discoverySpeed: 0.004,    
                sunSpinSpeed: 0.0004      
            };

            const container = document.getElementById('solarContainer');
            const canvas = document.getElementById('solarCanvas');

            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(container.clientWidth, container.clientHeight);

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 6, 24);
            camera.lookAt(0, 0, 0);

            scene.add(new THREE.AmbientLight(0x333344, 1.2));
            const sunLight = new THREE.PointLight(0xffeedd, 2.5, 50, 0.5);
            scene.add(sunLight);
            const fillLight = new THREE.DirectionalLight(0x8899aa, 0.8);
            fillLight.position.set(5, 5, 10);
            scene.add(fillLight);

            const solarSystem = new THREE.Group();
            scene.add(solarSystem);

            const loader = new THREE.TextureLoader();
            const textureURLs = {
                sun: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/sunmap.jpg',
                mercury: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/mercurymap.jpg',
                venus: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/venusmap.jpg',
                earth: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/earthmap1k.jpg',
                mars: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/marsmap1k.jpg',
                jupiter: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/jupitermap.jpg'
            };
            const bumpURLs = {
                mercury: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/mercurybump.jpg',
                venus: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/venusbump.jpg',
                earth: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/earthbump1k.jpg',
                mars: 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/marsbump1k.jpg',
                jupiter: null
            };

            // Sun
            const sunMesh = new THREE.Mesh(
                new THREE.SphereGeometry(1.5, 64, 64),
                new THREE.MeshBasicMaterial({ map: loader.load(textureURLs.sun), color: 0xffaa00 })
            );
            solarSystem.add(sunMesh);

            // REALISTIC ORBITAL PERIODS 
            const planets = [
                { name: 'Mercury', label: 'CV', radius: 0.3, orbit: 3.0, period: 14.5, url: 'cv.html', texture: textureURLs.mercury, bump: bumpURLs.mercury },
                { name: 'Venus', label: 'Research Output', radius: 0.55, orbit: 4.5, period: 37.0, url: 'Research_Output.html', texture: textureURLs.venus, bump: bumpURLs.venus },
                { name: 'Earth', label: 'Fieldwork', radius: 0.6, orbit: 6.0, period: 60.0, url: 'fieldwork.html', texture: textureURLs.earth, bump: bumpURLs.earth },
                { name: 'Mars', label: 'Procrastination', radius: 0.4, orbit: 7.8, period: 113.0, url: 'procrastination.html', texture: textureURLs.mars, bump: bumpURLs.mars },
                { name: 'Jupiter', label: 'Contact', radius: 1.1, orbit: 10.0, period: 712.0, url: 'contact.html', texture: textureURLs.jupiter, bump: bumpURLs.jupiter },
            ];

            const planetObjects = [];
            planets.forEach((p, index) => {
                const baseAngle = (index / planets.length) * Math.PI * 2;
                const pivot = new THREE.Object3D();
                pivot.rotation.y = baseAngle; 
                solarSystem.add(pivot);

                const geom = new THREE.SphereGeometry(p.radius, 48, 48);
                const matConfig = { roughness: 0.7, metalness: 0.1 };
                if (p.texture) matConfig.map = loader.load(p.texture);
                if (p.bump) { matConfig.bumpMap = loader.load(p.bump); matConfig.bumpScale = 0.05; }
                
                const mesh = new THREE.Mesh(geom, new THREE.MeshStandardMaterial(matConfig));
                mesh.position.x = p.orbit;
                mesh.name = p.name;
                pivot.add(mesh);
                
                planetObjects.push({ name: p.name, label: p.label, mesh: mesh, pivot: pivot, baseAngle: baseAngle, period: p.period, url: p.url });
            });

            // Orbit rings 
            const orbitLineMaterials = [];
            planets.forEach(p => {
                const points = [];
                for (let i = 0; i <= 128; i++) {
                    const angle = (i / 128) * Math.PI * 2;
                    points.push(new THREE.Vector3(Math.cos(angle) * p.orbit, 0, Math.sin(angle) * p.orbit));
                }
                const orbitMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), orbitMat);
                solarSystem.add(line);
                orbitLineMaterials.push(orbitMat);
            });

            /* ==========================================
               ✨ ROUND STARS & COLOR TOGGLING
               ========================================== */
            function createRoundStarTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 32; canvas.height = 32;
                const ctx = canvas.getContext('2d');
                ctx.beginPath();
                ctx.arc(16, 16, 16, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                return new THREE.CanvasTexture(canvas);
            }

            const starsGeom = new THREE.BufferGeometry();
            const starsCount = 600;
            const starsPos = new Float32Array(starsCount * 3);
            for (let i = 0; i < starsCount * 3; i += 3) {
                starsPos[i] = (Math.random() - 0.5) * 80;
                starsPos[i+1] = (Math.random() - 0.5) * 50;
                starsPos[i+2] = (Math.random() - 0.5) * 60;
            }
            starsGeom.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
            
            const starsMat = new THREE.PointsMaterial({ 
                color: 0xffffff, size: 0.1, map: createRoundStarTexture(), transparent: true, alphaTest: 0.1
            });
            scene.add(new THREE.Points(starsGeom, starsMat));

            // ============== DISCOVERY ONE (DETAILED) ==============
            function createDiscoveryOne() {
                const ship = new THREE.Group();
                ship.userData.flames = []; 

                const hullWhite = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.3, metalness: 0.2 });
                const hullDark  = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.4, metalness: 0.4 });
                const engineMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.7, metalness: 0.6 });
                const antenaMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.3, metalness: 0.8 });
                
                const flameMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
                const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });

                const spine = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 2.4, 8), hullWhite);
                spine.rotation.x = Math.PI/2; ship.add(spine);

                for (let i = -1.1; i <= 1.1; i += 0.55) {
                    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.03, 8, 16), hullDark);
                    ring.position.z = i; ring.rotation.x = Math.PI/2; ship.add(ring);
                }

                const cmd = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), hullWhite);
                cmd.position.z = 1.35; ship.add(cmd);

                const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.25, 8), hullDark);
                neck.position.z = 1.1; neck.rotation.x = Math.PI/2; ship.add(neck);

                const dishBase = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.15, 6), antenaMat);
                dishBase.position.set(0, 0.28, 1.5); ship.add(dishBase);
                
                const dish = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.05, 16), hullDark);
                dish.position.set(0, 0.35, 1.5); dish.rotation.x = Math.PI/2; ship.add(dish);
                
                const feed = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.08, 4), hullDark);
                feed.position.set(0, 0.3, 1.5); ship.add(feed);

                const engineHousing = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.5, 8), engineMat);
                engineHousing.position.z = -1.4; engineHousing.rotation.x = Math.PI/2; ship.add(engineHousing);

                const flameGeom = new THREE.ConeGeometry(0.1, 1.5, 16);
                flameGeom.translate(0, 0.75, 0); flameGeom.rotateX(-Math.PI/2);   

                const coreGeom = new THREE.ConeGeometry(0.05, 0.6, 16);
                coreGeom.translate(0, 0.3, 0); coreGeom.rotateX(-Math.PI/2);    

                const nozzlePositions = [[0.15, 0.15], [0.15, -0.15], [-0.15, 0.15], [-0.15, -0.15]];
                nozzlePositions.forEach(([dx, dy]) => {
                    const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.2, 6), engineMat);
                    nozzle.position.set(dx, dy, -1.65); nozzle.rotation.x = Math.PI/2; ship.add(nozzle);

                    const flame = new THREE.Mesh(flameGeom, flameMat);
                    flame.position.set(dx, dy, -1.75); ship.add(flame); ship.userData.flames.push(flame);

                    const core = new THREE.Mesh(coreGeom, coreMat);
                    core.position.set(dx, dy, -1.75); ship.add(core); ship.userData.flames.push(core);
                });

                for (let side = -1; side <= 1; side += 2) {
                    const thruster = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.1, 4), hullDark);
                    thruster.position.set(side * 0.2, 0, 0.3); ship.add(thruster);
                    const thruster2 = thruster.clone(); thruster2.position.z = -0.3; ship.add(thruster2);
                }

                return ship;
            }

            const discoveryShip = createDiscoveryOne();
            discoveryShip.position.set(-15, 2.5, -14); 
            discoveryShip.scale.set(0.425, 0.425, 0.425);
            discoveryShip.rotation.y = Math.PI/2;
            discoveryShip.rotation.z = -0.05; 
            scene.add(discoveryShip);

            // Hover detection
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let hoveredPlanetName = null;

            window.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(planetObjects.map(p => p.mesh));
                hoveredPlanetName = intersects.length > 0 ? intersects[0].object.name : null;
                container.style.cursor = hoveredPlanetName ? 'pointer' : 'grab';
            });

            // Labels
            const labelDivs = [];
            planetObjects.forEach(p => {
                const div = document.createElement('div');
                div.className = 'planet-label';
                div.textContent = p.label;
                container.appendChild(div);
                labelDivs.push({ div, planet: p });
            });

            // Drag interaction
            let isDragging = false, previousMouse = { x: 0, y: 0 }, rotationTarget = { x: 0, y: 0 };

            function onPointerDown(e) {
                isDragging = true;
                const touch = e.touches ? e.touches[0] : e;
                previousMouse = { x: touch.clientX, y: touch.clientY };
                rotationTarget = { x: 0, y: 0 };
            }
            function onPointerMove(e) {
                if (!isDragging) return;
                const touch = e.touches ? e.touches[0] : e;
                rotationTarget.y += (touch.clientX - previousMouse.x) * CONFIG.dragSensitivity;
                rotationTarget.x += (touch.clientY - previousMouse.y) * CONFIG.dragSensitivity;
                previousMouse = { x: touch.clientX, y: touch.clientY };
            }
            function onPointerUp() { isDragging = false; }

            container.addEventListener('mousedown', onPointerDown);
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('mouseup', onPointerUp);

            // Click routing
            canvas.addEventListener('click', (e) => {
                if (Math.abs(rotationTarget.y) > 0.05) return;
                raycaster.setFromCamera(mouse, camera);
                const clickIntersects = raycaster.intersectObjects([sunMesh, ...planetObjects.map(p => p.mesh)]);

                if (clickIntersects.length > 0) {
                    if (clickIntersects[0].object === sunMesh) {
                        const toggle = document.getElementById('theme-toggle');
                        toggle.checked = !toggle.checked;
                        toggle.dispatchEvent(new Event('change'));
                    } else {
                        const clicked = planetObjects.find(p => p.mesh === clickIntersects[0].object);
                        if (clicked && clicked.url) window.location.href = clicked.url;
                    }
                }
            });

            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('change', () => {
                const isDark = themeToggle.checked;
                document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                
                const activeColor = isDark ? 0xffffff : 0x212529;
                starsMat.color.setHex(activeColor); 
                orbitLineMaterials.forEach(mat => mat.color.setHex(activeColor));
            });
            
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
            themeToggle.checked = savedTheme === 'dark';
            
            const initialColor = savedTheme === 'dark' ? 0xffffff : 0x212529;
            starsMat.color.setHex(initialColor);
            orbitLineMaterials.forEach(mat => mat.color.setHex(initialColor));

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);

                if (!isDragging) {
                    rotationTarget.x *= CONFIG.momentumFriction;
                    rotationTarget.y *= CONFIG.momentumFriction;
                }
                solarSystem.rotation.x += rotationTarget.x;
                solarSystem.rotation.y += rotationTarget.y; 

                const timeSec = performance.now() / 1000;

                labelDivs.forEach(item => {
                    item.planet.pivot.rotation.y = item.planet.baseAngle + (timeSec * (Math.PI * 2) / item.planet.period);
                    item.planet.mesh.rotation.y += CONFIG.planetSpinSpeed;
                    
                    const worldPos = new THREE.Vector3();
                    item.planet.mesh.getWorldPosition(worldPos);
                    const screenPos = worldPos.clone().project(camera);
                    
                    const isHovered = (item.planet.name === hoveredPlanetName);
                    item.div.style.left = ((screenPos.x * 0.5 + 0.5) * container.clientWidth) + 'px';
                    item.div.style.top = ((-screenPos.y * 0.5 + 0.5) * container.clientHeight) + 'px';
                    item.div.style.opacity = (screenPos.z > 1 || !isHovered) ? 0 : 1;
                });

                sunMesh.rotation.y += CONFIG.sunSpinSpeed;

                // Move Discovery One
                discoveryShip.position.x += CONFIG.discoverySpeed;
                if (discoveryShip.position.x > 25) {
                    discoveryShip.position.x = -25;
                }
                discoveryShip.rotation.z = -0.05 + Math.sin(Date.now() * 0.0008) * 0.03;

                if (discoveryShip.userData.flames) {
                    discoveryShip.userData.flames.forEach(f => {
                        const flicker = 0.85 + Math.random() * 0.3;
                        f.scale.set(flicker, flicker, flicker); 
                    });
                }

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        })();
    </script>
</body>
